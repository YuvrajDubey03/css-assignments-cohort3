<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Squid Game Landing Page</title>

  <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="main">

    <!-- NAVBAR -->
    <nav>

      <div class="logo">
        <img src="logoo.png" alt="Squid Game Logo">
      </div>

      <div class="nav-links">
        <a href="#">About</a>
        <a href="#">Watch now</a>
        <a href="#">Actors</a>
        <a href="#">Contact</a>
      </div>

      <div class="menu">
        <i class="ri-menu-3-line"></i>
      </div>

    </nav>


    <!-- HERO SECTION -->
    <section class="hero">

      <!-- LEFT -->
      <div class="left">

      <img src="left.png" alt="">

        <p>
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang
          <br>
          Season 1: 9 Episodes
        </p>

        <div class="buttons">

          <button class="play-btn">
            <i class="ri-play-circle-fill"></i>
            Play Now
          </button>

          <button class="trailer-btn">
            <i class="ri-play-line"></i>
            Watch Trailer
          </button>

        </div>

      </div>


      <!-- CENTER -->
      <div class="center">

        <div class="scroll">
          <span>SCROLL</span>
          <div class="line"></div>
        </div>

      </div>


      <!-- RIGHT -->
      <div class="right">

        <img
          src="center.png"
          alt=""
        >

        <div class="socials">
          <i class="ri-twitter-x-line"></i>
          <i class="ri-instagram-line"></i>
          <i class="ri-facebook-circle-line"></i>
        </div>

      </div>

    </section>



    <!-- CARDS -->
    <div class="cards">

      <div class="card">
        <img
          src="l1.webp"
          alt=""
        >
        <div class="play">
          <i class="ri-play-fill"></i>
        </div>
      </div>

      <div class="card">
        <img
          src="l2.webp"
          alt=""
        >
        <div class="play">
          <i class="ri-play-fill"></i>
        </div>
      </div>

      <div class="card">
        <img
          src="card1.webp"
          alt=""
        >
        <div class="play">
          <i class="ri-play-fill"></i>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
